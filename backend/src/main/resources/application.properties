# Spring Boot Server configuration
server.port=8080

# CRITICAL SECURITY: Bind strictly to localhost (127.0.0.1)
# This prevents unauthorized access from other devices on the same network or the internet.
server.address=127.0.0.1

# Increase file transfer size limit if needed (e.g. for uploading custom wallpapers)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable clean logging
logging.level.com.astra.assistant=INFO
logging.level.org.springframework.web=INFO
